index:
  qmd:
lang: es

format:
  html:
    theme:
      light: [flatly, light.scss]
      dark: [darkly, dark.scss]

    number-sections: false
    toc: true
    page-layout: full
  epub:
    cover-image: images/icon.png


filters: 
  - pyodide

