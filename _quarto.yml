project:
  type: book
  output-dir: docs
  render:
    - "index.qmd"
    - "material/modulo_01/index.qmd"
    - "material/modulo_01/s*.qmd"
    - "material/modulo_02/index.qmd"
    - "material/modulo_02/s*.qmd"
    - "material/modulo_03/index.qmd"
    - "material/modulo_03/s*.qmd"
    - "material/anexos/*.qmd"
    - "material/anexos/*.ipynb"

book:
  title: "ICS294 - Econometría"
  author: 
    - "Francisco Alfaro & Jocelyn Tapia" 
  date: "03/03/2026"
  favicon: "images/icon.png"
  repo-url: "https://github.com/fralfaro/ICS294"
  sidebar:
    logo: "images/logo3.png"
  


  chapters:
    - index.qmd
    - part: material/modulo_01/index.qmd  # <-- archivo, no texto
      chapters:
        - material/modulo_01/s1.qmd
        - material/modulo_01/s2.qmd
        - material/modulo_01/s3.qmd
        - material/modulo_01/s4.qmd
        - material/modulo_01/s5.qmd
        - material/modulo_01/s6.qmd
        - material/modulo_01/s7.qmd 
        - material/modulo_01/s8.qmd 

    - part: material/modulo_02/index.qmd  # <-- archivo, no texto
      chapters:
        - material/modulo_02/s9.qmd
        - material/modulo_02/s10.qmd
        - material/modulo_02/s11.qmd
        - material/modulo_02/s12.qmd
        - material/modulo_02/s13.qmd
        - material/modulo_02/s14.qmd

    - part: material/modulo_03/index.qmd  # <-- archivo, no texto
      chapters:
        - material/modulo_03/s15.qmd
        - material/modulo_03/s16.qmd
        - material/modulo_03/s17.qmd
        - material/modulo_03/s18.qmd
        - material/modulo_03/s19.qmd
