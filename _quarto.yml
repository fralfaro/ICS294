        - material/modulo_03/s21.qmd

    - part: Anexos
      chapters:
        - material/anexos/estadistica_descriptiva_r.qmd
        - material/anexos/variables_aleatorias.qmd
        - material/anexos/inferencia_estadistica.qmd
        - material/anexos/algebra_matricial.qmd
